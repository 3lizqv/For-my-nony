<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Nony</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: #000 !important; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #start-btn {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: #ff69b4; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; cursor: pointer; border: none; text-align: center;
            padding: 20px;
        }

        #matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.5;
        }

        #heart-box {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        /* THE LARGE MESSAGE STYLE */
        #msg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center; z-index: 20;
            width: 85%; font-weight: 600;
            /* Adjusting font size for long text */
            font-size: clamp(14px, 3.5vw, 18px); 
            text-shadow: 0 0 8px #ff69b4; 
            opacity: 0;
            transition: opacity 2s ease-in;
            line-height: 1.6;
        }

        .dot {
            position: absolute; width: 5px; height: 5px;
            background: #ff69b4; border-radius: 50%;
            box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
            opacity: 0;
            transform: translate(-50%, -50%);
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <button id="start-btn"><br><br>(tap to open) 👅</button>
    
    <div id="msg">
        Happy birthday day ya ro7y<br>
        Kol sana w enti alby w 3a2ly<br>
        w tefdaly dayman ma3aya<br>
        w nefdal dayman le ba3d,<br>
        w keberty sana yarit ne3'a2el ba2a<br>
        w neshoof 7ayatna, w ana hafdal<br>
        dayman ma3aky w asanedek<br>
        ya a7la Nony fel donya<br>
        <span style="color: #ff69b4; font-size: 1.2em;">B7BKKKKKK ❤️</span>
    </div>

    <canvas id="matrix"></canvas>
    <div id="heart-box"></div>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const box = document.getElementById('heart-box');
        const msg = document.getElementById('msg');

        let drops = [];
        const fontSize = 16;
        const chars = "01❤️HASNAA";

        function setupMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = Math.floor(canvas.width / fontSize);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = fontSize + "px monospace";
            
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        function makeHeart() {
            const count = 80; // More dots for a bigger, smoother heart
            // Increased size from 40 to 32 to make the heart wider for the text
            const size = Math.min(window.innerWidth, window.innerHeight) / 30;

            for (let i = 0; i < count; i++) {
                const t = (i / count) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const d = document.createElement('div');
                d.className = 'dot';
                // Centering math
                d.style.left = (window.innerWidth / 2 + x * size) + "px";
                d.style.top = (window.innerHeight / 2 + y * size) + "px";
                d.style.animationDelay = (i * 0.04) + "s";
                box.appendChild(d);
            }
            // Fade message in after heart starts
            setTimeout(() => { msg.style.opacity = 1; }, 800);
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            setupMatrix();
            setInterval(drawMatrix, 50);
            makeHeart();
        });

        window.addEventListener('resize', () => {
            setupMatrix();
        });
    </script>
</body>
</html>
